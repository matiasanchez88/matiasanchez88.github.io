<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Al Mayoreo | Directorio Mayorista de Argentina</title>
    <meta name="description" content="Conectamos minoristas con distribuidores y fabricantes mayoristas de toda Argentina. Sin intermediarios ni comisiones ocultas. Encontrá tu proveedor ideal.">

    <meta property="og:type" content="website">
    <meta property="og:url" content="https://matiasanchez88.github.io/">
    <meta property="og:title" content="Al Mayoreo | Directorio Mayorista de Argentina">
    <meta property="og:description" content="Conectamos minoristas con distribuidores y fabricantes mayoristas de toda Argentina. Sin intermediarios ni comisiones ocultas.">
    <meta property="og:image" content="https://matiasanchez88.github.io/og-image.png">

    <link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><rect width='100' height='100' rx='20' fill='%234f46e5'/><text y='.9em' font-size='65' x='12'>📦</text></svg>">

    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&family=Outfit:wght@400;500;600;700;800;900&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">

    <script>
        tailwind.config = {
            theme: {
                extend: {
                    fontFamily: { sans: ['Inter', 'sans-serif'], outfit: ['Outfit', 'sans-serif'] },
                    colors: {
                        brand: { 50:'#eef2ff', 100:'#e0e7ff', 200:'#c7d2fe', 400:'#818cf8', 600:'#4f46e5', 700:'#4338ca', 900:'#1e1b4b' }
                    }
                }
            }
        }
    </script>
    <style>
        ::-webkit-scrollbar { width: 5px; }
        ::-webkit-scrollbar-track { background: #f1f5f9; }
        ::-webkit-scrollbar-thumb { background: #c7d2fe; border-radius: 4px; }
        .view-section { transition: opacity 0.15s ease; }
        .grad-text {
            background: linear-gradient(135deg, #4f46e5 0%, #7c3aed 50%, #4f46e5 100%);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
        }
        .card-hover { transition: transform 0.18s ease, box-shadow 0.18s ease, border-color 0.18s ease; }
        .card-hover:hover { transform: translateY(-2px); box-shadow: 0 8px 30px rgba(79,70,229,0.1); border-color: #c7d2fe; }
        .badge { display: inline-flex; align-items: center; gap: 4px; font-size: 11px; font-weight: 600; padding: 3px 8px; border-radius: 6px; }
        .hero-grid { background-image: radial-gradient(circle, #c7d2fe 1px, transparent 1px); background-size: 28px 28px; }
        #mobile-menu { transition: max-height 0.25s ease, opacity 0.25s ease; max-height: 0; opacity: 0; overflow: hidden; }
        #mobile-menu.open { max-height: 300px; opacity: 1; }
        input:focus, select:focus, textarea:focus { outline: none; box-shadow: 0 0 0 3px rgba(79,70,229,0.15); }
        .toast { animation: slideIn 0.2s ease; }
        @keyframes slideIn { from { transform: translateX(40px); opacity: 0; } to { transform: translateX(0); opacity: 1; } }
        .stat-chip { background: rgba(79,70,229,0.07); border: 1px solid rgba(79,70,229,0.15); border-radius: 12px; padding: 12px 16px; }
        .empty-state { display: flex; flex-direction: column; align-items: center; justify-content: center; padding: 60px 20px; gap: 12px; color: #94a3b8; text-align: center; }
        @media (max-width: 768px) { .hero-title { font-size: 2.4rem !important; } }
    </style>
</head>
<body class="bg-slate-50 text-slate-800 min-h-screen flex flex-col font-sans">

    <div id="toast-container" class="fixed top-5 right-5 z-[100] flex flex-col gap-2 pointer-events-none"></div>

    <header class="sticky top-0 z-40 bg-white/95 backdrop-blur-md border-b border-slate-200 shadow-sm">
        <div class="max-w-7xl mx-auto px-4 sm:px-6 lg:px-8 h-16 md:h-20 flex justify-between items-center">
            <div class="flex items-center gap-2.5 cursor-pointer" onclick="changeView('home')">
                <div class="h-9 w-9 md:h-11 md:w-11 bg-brand-600 rounded-xl flex items-center justify-center text-white shadow">
                    <i class="fa-solid fa-boxes-packing text-sm md:text-base"></i>
                </div>
                <div>
                    <span class="font-outfit font-extrabold text-xl md:text-2xl tracking-tight grad-text">AL MAYOREO</span>
                </div>
            </div>
            <nav class="hidden md:flex items-center gap-6">
                <button onclick="changeView('home')" class="text-slate-500 hover:text-brand-600 font-medium text-sm transition flex items-center gap-1.5">
                    <i class="fa-solid fa-magnifying-glass text-xs"></i> Explorar
                </button>
            </nav>
            <div class="flex items-center gap-2">
                <div id="nav-auth-buttons">
                    <button onclick="openAuthModal()" class="bg-brand-600 hover:bg-brand-700 text-white px-4 py-2 md:px-5 md:py-2.5 rounded-xl font-semibold text-xs md:text-sm shadow transition flex items-center gap-2">
                        <i class="fa-solid fa-shop hidden sm:inline"></i>
                        <span>Sumar mi Tienda</span>
                    </button>
                </div>
            </div>
        </div>
    </header>

    <main class="flex-grow w-full">
        <section id="view-home" class="view-section">
            <div class="max-w-7xl mx-auto px-4 sm:px-6 lg:px-8 py-6 md:py-10">
                <div class="flex gap-8 items-start">
                    <aside class="w-64 shrink-0 hidden lg:block">
                        <div class="bg-white p-5 rounded-2xl border border-slate-200 shadow-sm space-y-5">
                            <input type="text" id="search-input" onkeyup="filterDirectory()" placeholder="Buscar..." class="w-full bg-slate-50 border border-slate-200 rounded-xl py-2 px-3 text-sm">
                        </div>
                    </aside>
                    <div class="flex-1 min-w-0">
                        <div id="grid-mayoristas" class="grid grid-cols-1 sm:grid-cols-2 xl:grid-cols-3 gap-5"></div>
                    </div>
                </div>
            </div>
        </section>

        <section id="view-perfil" class="view-section hidden">
            <div class="max-w-5xl mx-auto px-4 sm:px-6 lg:px-8 py-6 md:py-10">
                <button onclick="changeView('home')" class="mb-5 inline-flex items-center gap-2 text-sm font-semibold text-slate-500 hover:text-brand-600 transition">
                    <i class="fa-solid fa-arrow-left text-xs"></i> Volver
                </button>
                <div id="perfil-info-wrapper" class="bg-white rounded-2xl border border-slate-200 shadow-sm overflow-hidden mb-6 p-6"></div>
            </div>
        </section>

        <section id="view-admin" class="view-section hidden">
            <div class="max-w-4xl mx-auto px-4 sm:px-6 lg:px-8 py-8">
                <div class="flex justify-between items-center mb-6">
                    <h2 class="font-outfit font-extrabold text-2xl text-slate-900">Panel de tu Tienda</h2>
                    <button onclick="logoutAdmin()" class="bg-red-50 text-red-600 px-4 py-2 rounded-xl text-xs font-bold">Cerrar Sesión</button>
                </div>
                <div class="bg-white p-6 rounded-2xl border border-slate-200 shadow-sm space-y-5">
                    <div class="grid grid-cols-1 sm:grid-cols-2 gap-4">
                        <div>
                            <label class="block text-[11px] font-bold text-slate-500 mb-1">Nombre Comercial</label>
                            <input type="text" id="admin-nombre" class="w-full bg-slate-50 border border-slate-200 rounded-xl py-2 px-3 text-sm">
                        </div>
                        <div>
                            <label class="block text-[11px] font-bold text-slate-500 mb-1">Rubro</label>
                            <input type="text" id="admin-rubro" class="w-full bg-slate-50 border border-slate-200 rounded-xl py-2 px-3 text-sm">
                        </div>
                        <div>
                            <label class="block text-[11px] font-bold text-slate-500 mb-1">WhatsApp (+549... sin espacios)</label>
                            <input type="text" id="admin-whatsapp" placeholder="1123456789" class="w-full bg-slate-50 border border-slate-200 rounded-xl py-2 px-3 text-sm">
                        </div>
                        <div>
                            <label class="block text-[11px] font-bold text-slate-500 mb-1">Email de Contacto Público</label>
                            <input type="email" id="admin-email-contacto" placeholder="contacto@tuempresa.com" class="w-full bg-slate-50 border border-slate-200 rounded-xl py-2 px-3 text-sm">
                        </div>
                        <div>
                            <label class="block text-[11px] font-bold text-slate-500 mb-1">Nombre de Contacto / Encargado</label>
                            <input type="text" id="admin-nombre-contacto" placeholder="Juan Pérez" class="w-full bg-slate-50 border border-slate-200 rounded-xl py-2 px-3 text-sm">
                        </div>
                        <div>
                            <label class="block text-[11px] font-bold text-slate-500 mb-1">Dirección / Localidad / Provincia</label>
                            <input type="text" id="admin-direccion" placeholder="Calle Falsa 123, CABA" class="w-full bg-slate-50 border border-slate-200 rounded-xl py-2 px-3 text-sm">
                        </div>
                        <div>
                            <label class="block text-[11px] font-bold text-slate-500 mb-1">Instagram (Usuario sin @)</label>
                            <input type="text" id="admin-instagram" placeholder="tu_marca" class="w-full bg-slate-50 border border-slate-200 rounded-xl py-2 px-3 text-sm">
                        </div>
                        <div>
                            <label class="block text-[11px] font-bold text-slate-500 mb-1">Compra Mínima ($)</label>
                            <input type="number" id="admin-minimo" class="w-full bg-slate-50 border border-slate-200 rounded-xl py-2 px-3 text-sm">
                        </div>
                    </div>
                    <div>
                        <label class="block text-[11px] font-bold text-slate-500 mb-1">Descripción del Negocio</label>
                        <textarea id="admin-descripcion" rows="3" class="w-full bg-slate-50 border border-slate-200 rounded-xl p-3 text-sm resize-none"></textarea>
                    </div>
                    <button onclick="guardarDatosTiendaAdmin()" class="w-full bg-brand-600 text-white font-bold py-3 rounded-xl text-sm shadow">Guardar y Publicar Cambios</button>
                </div>
            </div>
        </section>
    </main>

    <div id="modal-auth" class="fixed inset-0 bg-slate-900/50 backdrop-blur-sm z-50 flex items-center justify-center p-4 hidden">
        <div class="bg-white rounded-2xl w-full max-w-sm p-6 space-y-4 shadow-2xl">
            <h3 class="font-outfit font-bold text-lg text-slate-900 text-center" id="auth-title">Crear Cuenta</h3>
            <div>
                <label class="block text-[11px] font-bold text-slate-500 mb-1">Correo electrónico</label>
                <input type="email" id="auth-email" class="w-full bg-slate-50 border border-slate-200 rounded-xl py-2 px-3 text-sm">
            </div>
            <div>
                <label class="block text-[11px] font-bold text-slate-500 mb-1">Contraseña</label>
                <input type="password" id="auth-password" class="w-full bg-slate-50 border border-slate-200 rounded-xl py-2 px-3 text-sm">
            </div>
            <button id="btn-auth-submit" onclick="procesarAuth()" class="w-full bg-brand-600 text-white font-bold py-3 rounded-xl text-sm">Continuar</button>
            <p class="text-center text-xs text-slate-400 cursor-pointer underline" onclick="toggleAuthMode()">¿Ya tenés cuenta? Inicia sesión</p>
            <button onclick="closeAuthModal()" class="w-full text-xs text-slate-400">Cancelar</button>
        </div>
    </div>

    <script>
        const SUPABASE_URL = 'https://iotqgmtcaumjgpksvmhn.supabase.co';
        const SUPABASE_KEY = 'sb_publishable_emvydP_eTN26uj5M4dzCGA_2FKgoTyx';
        
        let supabaseClient = null;
        if(typeof supabase !== 'undefined' && SUPABASE_URL) {
            supabaseClient = supabase.createClient(SUPABASE_URL, SUPABASE_KEY);
        }

        let currentView = 'home';
        let authMode = 'registro'; // 'registro' o 'login'
        let currentUser = null;
        let listaTiendas = [];

        window.onload = async () => {
            await cargarTiendas();
            chequearSesion();
        };

        function toggleAuthMode() {
            authMode = authMode === 'registro' ? 'login' : 'registro';
            document.getElementById('auth-title').innerText = authMode === 'registro' ? 'Crear Cuenta' : 'Iniciar Sesión';
        }

        async function chequearSesion() {
            if(!supabaseClient) return;
            const { data } = await supabaseClient.auth.getSession();
            if(data?.session) {
                currentUser = data.session.user;
                actualizarMenuNav(true);
            }
        }

        function actualizarMenuNav(logueado) {
            const div = document.getElementById('nav-auth-buttons');
            if(logueado) {
                div.innerHTML = `<button onclick="changeView('admin')" class="bg-slate-900 text-white px-4 py-2 rounded-xl text-xs font-bold">Ir a mi Panel</button>`;
            } else {
                div.innerHTML = `<button onclick="openAuthModal()" class="bg-brand-600 text-white px-4 py-2 rounded-xl text-xs font-bold">Sumar mi Tienda</button>`;
            }
        }

        async function procesarAuth() {
            const email = document.getElementById('auth-email').value;
            const password = document.getElementById('auth-password').value;
            if(!email || !password) return showToast('Completa los campos', 'error');

            if(authMode === 'registro') {
                const { data, error } = await supabaseClient.auth.signUp({ email, password });
                if(error) return showToast(error.message, 'error');
                
                // LOGIN AUTOMÁTICO EVITANDO LA VERIFICACIÓN
                const { data: logData, error: logErr } = await supabaseClient.auth.signInWithPassword({ email, password });
                if(logErr) return showToast('Cuenta creada. Inicia sesión normalmente.', 'success');
                currentUser = logData.user;
                showToast('Cuenta creada con éxito', 'success');
            } else {
                const { data, error } = await supabaseClient.auth.signInWithPassword({ email, password });
                if(error) return showToast(error.message, 'error');
                currentUser = data.user;
                showToast('Sesión iniciada', 'success');
            }
            actualizarMenuNav(true);
            closeAuthModal();
            changeView('admin');
            cargarDatosEnFormulario();
        }

        async function cargarTiendas() {
            if(!supabaseClient) return;
            const { data, error } = await supabaseClient.from('tiendas').select('*');
            if(!error && data) {
                listaTiendas = data;
                renderizarTiendas(data);
            }
        }

        function renderizarTiendas(tiendas) {
            const grid = document.getElementById('grid-mayoristas');
            grid.innerHTML = '';
            tiendas.forEach(t => {
                grid.innerHTML += `
                    <div class="bg-white p-5 rounded-2xl border border-slate-200 card-hover cursor-pointer" onclick="verPerfil('${t.id}')">
                        <h4 class="font-outfit font-bold text-lg text-slate-900">${t.nombre || 'Sin nombre'}</h4>
                        <p class="text-xs text-brand-600 font-semibold mb-2">${t.rubro || 'General'}</p>
                        <p class="text-slate-500 text-sm line-clamp-2 mb-4">${t.descripcion || 'Sin descripción'}</p>
                        <div class="text-xs text-slate-400 font-medium">📍 ${t.direccion || 'Argentina'}</div>
                    </div>
                `;
            });
        }

        function verPerfil(id) {
            const t = listaTiendas.find(tienda => tienda.id == id);
            if(!t) return;
            
            // LIMPIEZA TOTAL DEL NÚMERO DE WHATSAPP PARA QUE EL BOTÓN FUNCIONE PERFECTO
            let numLimpio = t.whatsapp ? t.whatsapp.replace(/\D/g, '') : '';
            if(numLimpio.startsWith('54')) {
                // Ya tiene código de país
            } else {
                numLimpio = '54' + numLimpio;
            }

            const wrapper = document.getElementById('perfil-info-wrapper');
            wrapper.innerHTML = `
                <h2 class="font-outfit font-black text-3xl text-slate-900 mb-2">${t.nombre}</h2>
                <span class="bg-brand-50 text-brand-700 px-3 py-1 rounded-full text-xs font-bold">${t.rubro}</span>
                <p class="text-slate-600 my-4 text-base">${t.descripcion || ''}</p>
                
                <div class="border-t pt-4 mt-4 grid grid-cols-1 sm:grid-cols-2 gap-3 text-sm text-slate-600">
                    <div><strong>📍 Ubicación:</strong> ${t.direccion || 'No especificada'}</div>
                    <div><strong>👤 Contacto:</strong> ${t.nombre_contacto || 'No especificado'}</div>
                    <div><strong>✉️ Email:</strong> ${t.email_contacto || 'No especificado'}</div>
                    <div><strong>📸 Instagram:</strong> ${t.instagram ? `@${t.instagram}` : 'No especificado'}</div>
                    <div><strong>💰 Mínimo de compra:</strong> $${t.minimo || '0'}</div>
                </div>

                <div class="mt-6 flex flex-wrap gap-3">
                    ${numLimpio ? `<a href="https://wa.me/${numLimpio}" target="_blank" class="bg-green-500 text-white px-5 py-3 rounded-xl font-bold flex items-center gap-2 text-sm shadow hover:bg-green-600 transition"><i class="fa-brands fa-whatsapp text-lg"></i> Contactar por WhatsApp</a>` : ''}
                    ${t.instagram ? `<a href="https://instagram.com/${t.instagram}" target="_blank" class="bg-gradient-to-tr from-yellow-500 to-purple-600 text-white px-5 py-3 rounded-xl font-bold flex items-center gap-2 text-sm shadow transition"><i class="fa-brands fa-instagram text-lg"></i> Ver Instagram</a>` : ''}
                </div>
            `;
            changeView('view-perfil');
        }

        async function cargarDatosEnFormulario() {
            if(!currentUser) return;
            const { data } = await supabaseClient.from('tiendas').select('*').eq('user_id', currentUser.id).single();
            if(data) {
                document.getElementById('admin-nombre').value = data.nombre || '';
                document.getElementById('admin-rubro').value = data.rubro || '';
                document.getElementById('admin-whatsapp').value = data.whatsapp || '';
                document.getElementById('admin-minimo').value = data.minimo || '';
                document.getElementById('admin-descripcion').value = data.descripcion || '';
                document.getElementById('admin-email-contacto').value = data.email_contacto || '';
                document.getElementById('admin-nombre-contacto').value = data.nombre_contacto || '';
                document.getElementById('admin-direccion').value = data.direccion || '';
                document.getElementById('admin-instagram').value = data.instagram || '';
            }
        }

        async function guardarDatosTiendaAdmin() {
            if(!currentUser) return showToast('Inicia sesión', 'error');
            
            const payload = {
                nombre: document.getElementById('admin-nombre').value,
                rubro: document.getElementById('admin-rubro').value,
                whatsapp: document.getElementById('admin-whatsapp').value,
                minimo: document.getElementById('admin-minimo').value,
                descripcion: document.getElementById('admin-descripcion').value,
                email_contacto: document.getElementById('admin-email-contacto').value,
                nombre_contacto: document.getElementById('admin-nombre-contacto').value,
                direccion: document.getElementById('admin-direccion').value,
                instagram: document.getElementById('admin-instagram').value,
                user_id: currentUser.id
            };

            // Intentar ver si ya existe registro para actualizar, sino insertar
            const { data: existe } = await supabaseClient.from('tiendas').select('id').eq('user_id', currentUser.id).single();
            
            let resultado;
            if(existe) {
                resultado = await supabaseClient.from('tiendas').update(payload).eq('user_id', currentUser.id);
            } else {
                resultado = await supabaseClient.from('tiendas').insert([payload]);
            }

            if(resultado.error) {
                showToast('Error al guardar datos: ' + resultado.error.message, 'error');
            } else {
                showToast('¡Datos publicados exitosamente!', 'success');
                await cargarTiendas();
                changeView('home');
            }
        }

        async function logoutAdmin() {
            await supabaseClient.auth.signOut();
            currentUser = null;
            actualizarMenuNav(false);
            showToast('Sesión cerrada', 'success');
            changeView('home');
        }

        function changeView(view) {
            document.getElementById('view-home').classList.add('hidden');
            document.getElementById('view-perfil').classList.add('hidden');
            document.getElementById('view-admin').classList.add('hidden');
            
            if(view === 'home') document.getElementById('view-home').classList.remove('hidden');
            if(view === 'view-perfil') document.getElementById('view-perfil').classList.remove('hidden');
            if(view === 'admin') document.getElementById('view-admin').classList.remove('hidden');
        }

        function openAuthModal() { document.getElementById('modal-auth').classList.remove('hidden'); }
        function closeAuthModal() { document.getElementById('modal-auth').classList.add('hidden'); }
        function showToast(msg, tipo) {
            const container = document.getElementById('toast-container');
            const t = document.createElement('div');
            t.className = `toast px-4 py-3 rounded-xl text-white text-sm font-semibold shadow-lg ${tipo === 'error' ? 'bg-red-600' : 'bg-slate-900'}`;
            t.innerText = msg;
            container.appendChild(t);
            setTimeout(() => t.remove(), 3500);
        }
        function filterDirectory() {
            const query = document.getElementById('search-input').value.toLowerCase();
            const filtradas = listaTiendas.filter(t => 
                (t.nombre && t.nombre.toLowerCase().includes(query)) || 
                (t.rubro && t.rubro.toLowerCase().includes(query)) ||
                (t.descripcion && t.descripcion.toLowerCase().includes(query))
            );
            renderizarTiendas(filtradas);
        }
    </script>
</body>
</html>
